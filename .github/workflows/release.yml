name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-linux
            zig_target: x86_64-linux-gnu
            artifact: buncore-linux-x64
            ext: ""
          - os: ubuntu-latest
            target: aarch64-linux
            zig_target: aarch64-linux-gnu
            artifact: buncore-linux-arm64
            ext: ""
          - os: macos-latest
            target: x86_64-macos
            zig_target: x86_64-macos-none
            artifact: buncore-darwin-x64
            ext: ""
          - os: macos-latest
            target: aarch64-macos
            zig_target: aarch64-macos-none
            artifact: buncore-darwin-arm64
            ext: ""
          - os: ubuntu-latest
            target: x86_64-windows
            zig_target: x86_64-windows-gnu
            artifact: buncore-win32-x64
            ext: ".exe"

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: "0.13.0"

      - name: Build CLI
        run: zig build -Doptimize=ReleaseFast -Dtarget=${{ matrix.zig_target }}

      - name: Build Daemon
        run: zig build -Doptimize=ReleaseFast -Dtarget=${{ matrix.zig_target }}

      - name: Package binaries
        run: |
          mkdir -p dist
          cp zig-out/bin/buncore${{ matrix.ext }} dist/buncore${{ matrix.ext }}
          cp zig-out/bin/buncored${{ matrix.ext }} dist/buncored${{ matrix.ext }}
          cd dist
          tar czf ../${{ matrix.artifact }}.tar.gz *

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*.tar.gz
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-npm:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Publish to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
