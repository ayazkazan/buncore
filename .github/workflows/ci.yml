name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
          - os: macos-latest
          # TODO: Fix Windows build (signal handling compatibility)

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: "0.13.0"

      - name: Build
        run: zig build

      - name: Test
        run: zig build test

      - name: Smoke test (Linux/macOS)
        run: |
          zig build -Doptimize=ReleaseFast
          ./zig-out/bin/buncore --help || true
