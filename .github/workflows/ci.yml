name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
          - os: macos-latest
          - os: windows-latest

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: "0.14.1"

      - name: Build
        run: zig build

      - name: Test
        run: zig build test

      - name: Smoke test (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          zig build -Doptimize=ReleaseFast
          ./zig-out/bin/bpm2 --help || true

      - name: Smoke test (Windows)
        if: runner.os == 'Windows'
        run: |
          zig build -Doptimize=ReleaseFast
          .\zig-out\bin\bpm2.exe --help
        shell: pwsh
